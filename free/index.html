<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Your Page Title</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 0;
  background: white;
  color: #111;
  font-family: Georgia, "Times New Roman", serif;
}

.container {
  max-width: 720px;
  margin: 80px auto;
  padding: 0 20px;
  font-size: 18px;
  line-height: 1.6;
}

#content {
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
  max-width: 100%;
  overflow-x: hidden;
  font-family: "Libre Baskerville", serif;
}
</style>
</head>

<body>

<div class="container">
  <div id="content"></div>
</div>

<script>
fetch("content.txt")
  .then(response => response.text())
  .then(text => {
    document.getElementById("content").textContent = text;
  });
</script>

</body>
</html>
